<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Panel | Control</title>
        <style>
            :root {
                --primary: #6366f1;
                --bg: #0f172a;
                --card-bg: #1e293b;
                --accent: #22c55e;
            }

            body {
                margin: 0;
                background: var(--bg);
                color: #f1f5f9;
                font-family: "Segoe UI", system-ui, sans-serif;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .container {
                width: 100%;
                max-width: 450px;
                background: var(--card-bg);
                padding: 32px;
                border-radius: 24px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            h1 {
                text-align: center;
                font-size: 1.5rem;
                margin-bottom: 24px;
                color: white;
            }

            .drop-area {
                border: 2px dashed #475569;
                border-radius: 20px;
                padding: 40px 20px;
                text-align: center;
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                background: rgba(15, 23, 42, 0.4);
                display: block;
            }

            .drop-area:hover {
                border-color: var(--primary);
                background: rgba(99, 102, 241, 0.05);
            }

            .drop-area p {
                margin: 0;
                color: #94a3b8;
                font-size: 0.95rem;
                line-height: 1.5;
            }

            .drop-area b {
                color: var(--primary);
            }

            input[type="file"] {
                display: none;
            }

            .preview {
                margin-top: 20px;
                width: 100%;
                border-radius: 12px;
                display: none;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            button {
                width: 100%;
                margin-top: 24px;
                padding: 14px;
                border: none;
                border-radius: 12px;
                background: var(--primary);
                color: white;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
            }

            button:hover {
                filter: brightness(1.1);
                transform: translateY(-1px);
            }

            .msg {
                text-align: center;
                margin-top: 20px;
                color: var(--accent);
                font-weight: 500;
                background: rgba(34, 197, 94, 0.1);
                padding: 10px;
                border-radius: 10px;
            }

            .actions {
                margin-top: 30px;
                display: flex;
                justify-content: space-between;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                padding-top: 20px;
            }

            a {
                color: #94a3b8;
                text-decoration: none;
                font-size: 0.85rem;
                transition: color 0.2s;
            }

            a:hover {
                color: white;
            }

            .btn-view {
                color: var(--primary);
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Panel de Control</h1>

            <form method="POST" enctype="multipart/form-data">
                <label class="drop-area" id="dropArea">
                    <p id="text-prompt">
                        Arrastra tu imagen aquí <br />
                        o <b>haz clic para buscar</b>
                    </p>
                    <input
                        type="file"
                        name="imagen"
                        id="fileInput"
                        accept="image/*"
                        required
                    />
                    <img id="preview" class="preview" />
                </label>

                <button type="submit">Actualizar Contenido</button>
            </form>

            {% if mensaje %}
            <p class="msg">{{ mensaje }}</p>
            {% endif %}

            <div class="actions">
                <a href="/qr" target="_blank" class="btn-view">👁 Ver actual</a>
                <a href="/logout">Cerrar sesión</a>
            </div>
        </div>

        <script>
            const dropArea = document.getElementById("dropArea");
            const fileInput = document.getElementById("fileInput");
            const preview = document.getElementById("preview");
            const textPrompt = document.getElementById("text-prompt");

            function handleFile(file) {
                if (file && file.type.startsWith("image/")) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        preview.src = ev.target.result;
                        preview.style.display = "block";
                        textPrompt.style.display = "none";
                    };
                    reader.readAsDataURL(file);
                }
            }

            fileInput.addEventListener("change", (e) =>
                handleFile(e.target.files[0]),
            );

            dropArea.addEventListener("dragover", (e) => {
                e.preventDefault();
                dropArea.style.borderColor = "#6366f1";
            });

            dropArea.addEventListener("dragleave", () => {
                dropArea.style.borderColor = "#475569";
            });

            dropArea.addEventListener("drop", (e) => {
                e.preventDefault();
                fileInput.files = e.dataTransfer.files;
                handleFile(e.dataTransfer.files[0]);
            });
        </script>
    </body>
</html>
