<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | Admin</title>
        <style>
            :root {
                --primary: #6366f1;
                --primary-hover: #4f46e5;
                --bg: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.7);
                --text: #f8fafc;
            }

            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: radial-gradient(
                    circle at top left,
                    #1e1b4b,
                    #0f172a
                );
                font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    sans-serif;
                color: var(--text);
            }

            .box {
                background: var(--card-bg);
                backdrop-filter: blur(12px);
                padding: 40px;
                border-radius: 24px;
                width: 90%;
                max-width: 360px;
                text-align: center;
                box-shadow:
                    0 20px 25px -5px rgba(0, 0, 0, 0.3),
                    0 8px 10px -6px rgba(0, 0, 0, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 8px;
                font-weight: 700;
                letter-spacing: -0.025em;
            }

            p.subtitle {
                color: #94a3b8;
                font-size: 0.9rem;
                margin-bottom: 24px;
            }

            input {
                width: 100%;
                padding: 14px;
                margin-top: 10px;
                box-sizing: border-box;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                background: rgba(15, 23, 42, 0.6);
                color: white;
                font-size: 16px;
                transition: all 0.3s;
            }

            input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            }

            button {
                width: 100%;
                padding: 14px;
                margin-top: 24px;
                border: none;
                border-radius: 12px;
                background: var(--primary);
                color: white;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    transform 0.2s,
                    background 0.2s;
            }

            button:hover {
                background: var(--primary-hover);
                transform: translateY(-1px);
            }

            button:active {
                transform: translateY(0);
            }

            .error {
                background: rgba(239, 68, 68, 0.1);
                color: #fca5a5;
                padding: 10px;
                border-radius: 10px;
                margin-top: 20px;
                font-size: 0.85rem;
                border: 1px solid rgba(239, 68, 68, 0.2);
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>Bienvenido</h1>
            <p class="subtitle">Ingresa la clave de administrador</p>

            <form method="POST">
                <input
                    type="password"
                    name="password"
                    placeholder="••••••••"
                    required
                />
                <button type="submit">Entrar al Panel</button>
            </form>

            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}
        </div>
    </body>
</html>
